<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PaintAR - Selecteer & Verf</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #000; overflow: hidden; height: 100vh; touch-action: none; }

#container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
#video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); cursor: crosshair; z-index: 3; }

#selectionCanvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); pointer-events: none; z-index: 2; }
#resultCanvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); pointer-events: none; z-index: 4; }

#ui {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 60px 20px 30px;
  pointer-events: none;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
#ui > * { pointer-events: auto; }

#ui.collapsed {
  transform: translateY(calc(100% - 50px));
  opacity: 0.6;
}
#ui.collapsed #colorPicker,
#ui.collapsed #controls { opacity: 0; pointer-events: none; }
#ui-toggle {
  position: absolute; top: 5px; right: 20px;
  font-size: 20px; cursor: pointer; opacity: 0.5;
  transition: opacity 0.15s; pointer-events: auto;
}
#ui-toggle:hover { opacity: 1; }

#colorPicker {
  display: flex; gap: 10px; align-items: center;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px; padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.1);
  flex-wrap: wrap;
  transition: opacity 0.3s;
}

#colorPicker input[type="color"] {
  width: 44px; height: 44px; border: 2px solid rgba(255,255,255,0.3);
  border-radius: 10px; cursor: pointer; background: none; padding: 2px;
}
#colorPicker input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
#colorPicker input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

.presets { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
.preset {
  width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer; transition: transform 0.15s; flex-shrink: 0;
}
.preset:hover, .preset.active { transform: scale(1.15); border-color: white; }

#controls { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; transition: opacity 0.3s; }
#controls label { color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500; white-space: nowrap; }
#controls input[type="range"] { flex: 1; min-width: 80px; accent-color: white; height: 4px; }
#opacityValue { color: white; font-size: 12px; font-weight: 600; min-width: 28px; text-align: right; }

.tool-btn {
  font-size: 12px; font-weight: 600; color: white;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px; padding: 7px 14px; cursor: pointer;
  white-space: nowrap; transition: background 0.15s;
}
.tool-btn:hover { background: rgba(255,255,255,0.25); }
.tool-btn.active { background: rgba(255,255,255,0.3); border-color: white; }

#status {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10; color: white;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 8px 20px; border-radius: 30px;
  font-size: 13px; font-weight: 500;
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  transition: opacity 0.3s;
}
#startBtn {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 20; font-size: 18px; font-weight: 600; color: white;
  background: #007aff; border: none; border-radius: 30px;
  padding: 16px 40px; cursor: pointer;
  box-shadow: 0 8px 30px rgba(0,122,255,0.4);
  transition: transform 0.15s;
}
#startBtn:hover { transform: translate(-50%, -50%) scale(1.05); }

#selectionInfo {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  z-index: 8; color: white; font-size: 12px; font-weight: 500;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0; transition: opacity 0.3s;
}
</style>
</head>
<body>

<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <canvas id="selectionCanvas"></canvas>
  <canvas id="resultCanvas"></canvas>

  <div id="status">📱 Tik op Start om de camera te openen</div>
  <button id="startBtn">Start Camera</button>
  <div id="selectionInfo"></div>

  <div id="ui">
    <div id="ui-toggle">▼</div>
    <div id="colorPicker">
      <input type="color" id="mainColor" value="#4A90D9">
      <div class="presets">
        <div class="preset active" style="background:#4A90D9" data-color="#4A90D9"></div>
        <div class="preset" style="background:#E74C3C" data-color="#E74C3C"></div>
        <div class="preset" style="background:#2ECC71" data-color="#2ECC71"></div>
        <div class="preset" style="background:#F1C40F" data-color="#F1C40F"></div>
        <div class="preset" style="background:#9B59B6" data-color="#9B59B6"></div>
        <div class="preset" style="background:#E67E22" data-color="#E67E22"></div>
        <div class="preset" style="background:#1ABC9C" data-color="#1ABC9C"></div>
        <div class="preset" style="background:#ECF0F1" data-color="#ECF0F1"></div>
        <div class="preset" style="background:#2C3E50" data-color="#2C3E50"></div>
      </div>
    </div>
    <div id="controls">
      <label>Sterkte</label>
      <input type="range" id="opacitySlider" min="10" max="100" value="70">
      <span id="opacityValue">70%</span>
      <button class="tool-btn" id="shadowToggle">🌓 Schaduw</button>
      <button class="tool-btn active" id="modeSelect">🖱️ Selecteer</button>
      <button class="tool-btn" id="modeBrush">🖌️ Penseel</button>
      <button class="tool-btn" id="clearBtn">✕ Wis</button>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const selCanvas = document.getElementById('selectionCanvas');
const selCtx = selCanvas.getContext('2d');
const resultCanvas = document.getElementById('resultCanvas');
const resultCtx = resultCanvas.getContext('2d');

const colorPicker = document.getElementById('mainColor');
const opacitySlider = document.getElementById('opacitySlider');
const opacityValue = document.getElementById('opacityValue');
const status = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const presets = document.querySelectorAll('.preset');
const selectionInfo = document.getElementById('selectionInfo');
const modeSelect = document.getElementById('modeSelect');
const modeBrush = document.getElementById('modeBrush');
const clearBtn = document.getElementById('clearBtn');
const shadowToggle = document.getElementById('shadowToggle');
const ui = document.getElementById('ui');
const uiToggle = document.getElementById('ui-toggle');

let stream = null;
let currentColor = '#4A90D9';
let opacity = 0.7;
let animationId = null;
let isRunning = false;

let tool = 'select';
let canvasW = 0, canvasH = 0;
let selectionMask = null;
let smoothMask = null;
let hasSelection = false;
let preserveShadows = true;
let shadowMin = 0, shadowMax = 1;

const TOLERANCE = 30;
const SCALE = 2;

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1,3), 16),
    g: parseInt(hex.slice(3,5), 16),
    b: parseInt(hex.slice(5,7), 16)
  };
}

function colorDist(c1, c2) {
  const dr = c1[0] - c2[0], dg = c1[1] - c2[1], db = c1[2] - c2[2];
  return Math.sqrt(dr*dr + dg*dg + db*db);
}

function getPixel(data, w, x, y) {
  const i = (y * w + x) * 4;
  return [data[i], data[i+1], data[i+2]];
}

function floodFill(imageData, startX, startY, tolerance) {
  const w = imageData.width, h = imageData.height;
  const data = imageData.data;
  const visited = new Uint8Array(w * h);
  const mask = new Uint8Array(w * h);

  const targetColor = getPixel(data, w, startX, startY);
  const queue = [[startX, startY]];
  visited[startY * w + startX] = 1;
  let count = 0;

  while (queue.length > 0) {
    const [x, y] = queue.shift();
    const idx = y * w + x;
    mask[idx] = 1;
    count++;

    const px = getPixel(data, w, x, y);
    if (colorDist(px, targetColor) > tolerance) continue;

    for (const [nx, ny] of [[x-1,y],[x+1,y],[x,y-1],[x,y+1]]) {
      if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
      const nidx = ny * w + nx;
      if (visited[nidx]) continue;
      visited[nidx] = 1;
      const np = getPixel(data, w, nx, ny);
      if (colorDist(np, targetColor) <= tolerance) {
        queue.push([nx, ny]);
      }
    }
  }
  return { mask, count };
}

function buildSmoothMask(sw, sh) {
  const smallCanvas = document.createElement('canvas');
  smallCanvas.width = sw;
  smallCanvas.height = sh;
  const sCtx = smallCanvas.getContext('2d');
  const imgData = sCtx.createImageData(sw, sh);
  for (let i = 0; i < sw * sh; i++) {
    const v = selectionMask[i] ? 255 : 0;
    imgData.data[i * 4] = v;
    imgData.data[i * 4 + 1] = v;
    imgData.data[i * 4 + 2] = v;
    imgData.data[i * 4 + 3] = 255;
  }
  sCtx.putImageData(imgData, 0, 0);

  const bigCanvas = document.createElement('canvas');
  bigCanvas.width = canvasW;
  bigCanvas.height = canvasH;
  const bCtx = bigCanvas.getContext('2d');
  bCtx.imageSmoothingEnabled = true;
  bCtx.imageSmoothingQuality = 'high';
  bCtx.drawImage(smallCanvas, 0, 0, canvasW, canvasH);

  const smoothData = bCtx.getImageData(0, 0, canvasW, canvasH);
  smoothMask = new Uint8Array(canvasW * canvasH);
  for (let i = 0; i < canvasW * canvasH; i++) {
    smoothMask[i] = smoothData.data[i * 4];
  }

  const origData = ctx.getImageData(0, 0, canvasW, canvasH).data;
  let sMin = 255, sMax = 0;
  for (let i = 0; i < canvasW * canvasH; i++) {
    if (smoothMask[i] > 10) {
      const idx = i * 4;
      const lum = 0.299 * origData[idx] + 0.587 * origData[idx + 1] + 0.114 * origData[idx + 2];
      if (lum < sMin) sMin = lum;
      if (lum > sMax) sMax = lum;
    }
  }
  shadowMin = sMin;
  shadowMax = Math.max(sMax, sMin + 1);
}

function createSelection(tapX, tapY) {
  if (!isRunning || !canvasW || !canvasH) return;

  canvas.width = canvasW;
  canvas.height = canvasH;
  ctx.drawImage(video, 0, 0, canvasW, canvasH);

  const sw = Math.ceil(canvasW / SCALE);
  const sh = Math.ceil(canvasH / SCALE);

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = sw;
  tempCanvas.height = sh;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(canvas, 0, 0, sw, sh);
  const imgData = tempCtx.getImageData(0, 0, sw, sh);

  const sx = Math.round(tapX / SCALE);
  const sy = Math.round(tapY / SCALE);

  status.textContent = '🔄 Bezig met selecteren...';
  setTimeout(() => {
    const result = floodFill(imgData, Math.min(sx, sw - 1), Math.min(sy, sh - 1), TOLERANCE);

    if (result.count < 50) {
      status.textContent = '⚠️ Te klein gebied, probeer een duidelijker vlak';
      return;
    }

    selectionMask = result.mask;
    hasSelection = true;
    buildSmoothMask(sw, sh);
    drawSelectionOverlay();
    selectionInfo.textContent = '✅ Gebied geselecteerd';
    selectionInfo.style.opacity = '1';
    status.textContent = '🎨 Tik op een ander vlak of kies een kleur';
    setTimeout(() => { selectionInfo.style.opacity = '0'; }, 3000);
  }, 10);
}

function drawSelectionOverlay() {
  selCanvas.width = canvasW;
  selCanvas.height = canvasH;
  selCtx.clearRect(0, 0, canvasW, canvasH);

  const overlay = selCtx.createImageData(canvasW, canvasH);
  const d = overlay.data;
  for (let i = 0; i < canvasW * canvasH; i++) {
    const v = smoothMask[i];
    if (v > 10) {
      d[i * 4] = 0;
      d[i * 4 + 1] = 200;
      d[i * 4 + 2] = 255;
      d[i * 4 + 3] = v;
    }
  }
  selCtx.putImageData(overlay, 0, 0);
}

function clearSelection() {
  hasSelection = false;
  selectionMask = null;
  smoothMask = null;
  selCanvas.width = canvasW || 1;
  selCanvas.height = canvasH || 1;
  selCtx.clearRect(0, 0, canvasW || 1, canvasH || 1);
  resultCanvas.width = canvasW || 1;
  resultCanvas.height = canvasH || 1;
  resultCtx.clearRect(0, 0, canvasW || 1, canvasH || 1);
  selectionInfo.style.opacity = '0';
  status.textContent = '👆 Tik op een vlak om te selecteren';
}

function processFrame() {
  if (!isRunning) return;
  const w = video.videoWidth, h = video.videoHeight;
  if (!w || !h) { animationId = requestAnimationFrame(processFrame); return; }
  canvasW = w;
  canvasH = h;

  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(video, 0, 0, w, h);

  if (hasSelection && smoothMask) {
    resultCanvas.width = w;
    resultCanvas.height = h;
    resultCtx.drawImage(canvas, 0, 0, w, h);

    const imgData = resultCtx.getImageData(0, 0, w, h);
    const d = imgData.data;
    const rgb = hexToRgb(currentColor);

    for (let i = 0; i < w * h; i++) {
      const weight = smoothMask[i] / 255;
      if (weight <= 0.01) continue;
      const idx = i * 4;
      const t = weight * opacity;

      if (preserveShadows) {
        const origIdx = idx;
        const lum = 0.299 * d[origIdx] + 0.587 * d[origIdx + 1] + 0.114 * d[origIdx + 2];
        const norm = (lum - shadowMin) / (shadowMax - shadowMin);
        const f = Math.max(0, Math.min(1, norm));
        const adjustedR = rgb.r * (0.15 + 0.85 * f);
        const adjustedG = rgb.g * (0.15 + 0.85 * f);
        const adjustedB = rgb.b * (0.15 + 0.85 * f);
        d[idx] = d[idx] * (1 - t) + adjustedR * t;
        d[idx + 1] = d[idx + 1] * (1 - t) + adjustedG * t;
        d[idx + 2] = d[idx + 2] * (1 - t) + adjustedB * t;
      } else {
        d[idx] = d[idx] * (1 - t) + rgb.r * t;
        d[idx + 1] = d[idx + 1] * (1 - t) + rgb.g * t;
        d[idx + 2] = d[idx + 2] * (1 - t) + rgb.b * t;
      }
    }
    resultCtx.putImageData(imgData, 0, 0);
  }

  animationId = requestAnimationFrame(processFrame);
}

let brushSize = 60;
let isPainting = false;

function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function paintAt(x, y) {
  if (!canvasW || !canvasH) return;
  resultCanvas.width = canvasW;
  resultCanvas.height = canvasH;
  resultCtx.drawImage(canvas, 0, 0, canvasW, canvasH);

  const imgData = resultCtx.getImageData(0, 0, canvasW, canvasH);
  const d = imgData.data;
  const rgb = hexToRgb(currentColor);
  const r2 = (brushSize / 2) * (brushSize / 2);

  for (let py = Math.max(0, Math.round(y - brushSize / 2)); py < Math.min(canvasH, Math.round(y + brushSize / 2)); py++) {
    for (let px = Math.max(0, Math.round(x - brushSize / 2)); px < Math.min(canvasW, Math.round(x + brushSize / 2)); px++) {
      const dx = px - x, dy = py - y;
      if (dx * dx + dy * dy > r2) continue;
      const i = (py * canvasW + px) * 4;
      d[i] = d[i] * (1 - opacity) + rgb.r * opacity;
      d[i + 1] = d[i + 1] * (1 - opacity) + rgb.g * opacity;
      d[i + 2] = d[i + 2] * (1 - opacity) + rgb.b * opacity;
    }
  }
  resultCtx.putImageData(imgData, 0, 0);
}

canvas.addEventListener('click', (e) => {
  if (tool !== 'select') return;
  const coords = getCanvasCoords(e);
  createSelection(Math.round(coords.x), Math.round(coords.y));
});

canvas.addEventListener('touchstart', (e) => {
  if (tool !== 'select') return;
  const coords = getCanvasCoords(e);
  createSelection(Math.round(coords.x), Math.round(coords.y));
}, { passive: true });

canvas.addEventListener('mousedown', (e) => {
  if (tool !== 'brush') return;
  isPainting = true;
  const coords = getCanvasCoords(e);
  paintAt(coords.x, coords.y);
});

canvas.addEventListener('mousemove', (e) => {
  if (tool !== 'brush' || !isPainting) return;
  const coords = getCanvasCoords(e);
  paintAt(coords.x, coords.y);
});

document.addEventListener('mouseup', () => { isPainting = false; });

canvas.addEventListener('touchstart', (e) => {
  if (tool !== 'brush') return;
  isPainting = true;
  const coords = getCanvasCoords(e);
  paintAt(coords.x, coords.y);
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  if (tool !== 'brush' || !isPainting) return;
  const coords = getCanvasCoords(e);
  paintAt(coords.x, coords.y);
}, { passive: true });

canvas.addEventListener('touchend', () => { isPainting = false; }, { passive: true });

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    startBtn.style.display = 'none';
    status.textContent = '👆 Tik op een vlak om te selecteren';
    isRunning = true;
    processFrame();
  } catch (err) {
    status.textContent = '❌ Camera niet beschikbaar: ' + err.message;
    startBtn.textContent = 'Probeer opnieuw';
  }
}

startBtn.addEventListener('click', startCamera);

colorPicker.addEventListener('input', () => {
  currentColor = colorPicker.value;
  presets.forEach(p => p.classList.toggle('active', p.dataset.color === currentColor));
});

presets.forEach(p => {
  p.addEventListener('click', () => {
    presets.forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentColor = p.dataset.color;
    colorPicker.value = currentColor;
  });
});

opacitySlider.addEventListener('input', () => {
  opacity = parseInt(opacitySlider.value) / 100;
  opacityValue.textContent = Math.round(opacity * 100) + '%';
});

modeSelect.addEventListener('click', () => {
  tool = 'select';
  modeSelect.classList.add('active');
  modeBrush.classList.remove('active');
  canvas.style.cursor = 'crosshair';
  selectionInfo.style.opacity = hasSelection ? '1' : '0';
  if (hasSelection) status.textContent = '🎨 Tik op een ander vlak of kies een kleur';
  else status.textContent = '👆 Tik op een vlak om te selecteren';
});

modeBrush.addEventListener('click', () => {
  tool = 'brush';
  modeBrush.classList.add('active');
  modeSelect.classList.remove('active');
  canvas.style.cursor = 'none';
  selectionInfo.style.opacity = '0';
  status.textContent = '🖌️ Sleep over het beeld om te verven';
});

shadowToggle.classList.add('active');

clearBtn.addEventListener('click', clearSelection);

shadowToggle.addEventListener('click', () => {
  preserveShadows = !preserveShadows;
  shadowToggle.classList.toggle('active', preserveShadows);
  shadowToggle.textContent = preserveShadows ? '🌓 Schaduw' : '☀️ Geen schaduw';
});

uiToggle.addEventListener('click', () => {
  ui.classList.toggle('collapsed');
  uiToggle.textContent = ui.classList.contains('collapsed') ? '▲' : '▼';
});
</script>
</body>
</html>
