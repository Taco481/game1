<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PaintAR - Verf Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #000; overflow: hidden; height: 100vh; touch-action: none; }

#container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
#video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
#colorOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

#ui {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 60px 20px 30px;
  pointer-events: none;
}
#ui > * { pointer-events: auto; }

#colorPicker {
  display: flex; gap: 10px; align-items: center;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px; padding: 16px 20px;
  border: 1px solid rgba(255,255,255,0.1);
  flex-wrap: wrap;
}

#colorPicker input[type="color"] {
  width: 48px; height: 48px; border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px; cursor: pointer; background: none; padding: 2px;
}
#colorPicker input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
#colorPicker input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }

.presets { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
.preset {
  width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer; transition: transform 0.15s; flex-shrink: 0;
}
.preset:hover, .preset.active { transform: scale(1.15); border-color: white; }

#controls { display: flex; gap: 10px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
#controls label { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; }
#controls input[type="range"] { flex: 1; min-width: 100px; accent-color: white; height: 4px; }
#opacityValue { color: white; font-size: 13px; font-weight: 600; min-width: 32px; text-align: right; }

#modeToggle {
  font-size: 13px; font-weight: 600; color: white;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px; padding: 8px 18px; cursor: pointer;
  white-space: nowrap; transition: background 0.15s;
}
#modeToggle:hover { background: rgba(255,255,255,0.25); }

#status {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; color: white;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 10px 24px; border-radius: 30px;
  font-size: 14px; font-weight: 500;
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}
#startBtn {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 20; font-size: 18px; font-weight: 600; color: white;
  background: #007aff; border: none; border-radius: 30px;
  padding: 16px 40px; cursor: pointer;
  box-shadow: 0 8px 30px rgba(0,122,255,0.4);
  transition: transform 0.15s;
}
#startBtn:hover { transform: translate(-50%, -50%) scale(1.05); }

#brushPreview {
  position: absolute; width: 80px; height: 80px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  pointer-events: none; z-index: 5;
  transform: translate(-50%, -50%);
  display: none;
}
</style>
</head>
<body>

<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <div id="colorOverlay"></div>
  </div>
  <div id="brushPreview"></div>

  <div id="status">📱 Tik op Start om de camera te openen</div>
  <button id="startBtn">Start Camera</button>

  <div id="ui">
    <div id="colorPicker">
      <input type="color" id="mainColor" value="#4A90D9">
      <div class="presets">
        <div class="preset active" style="background:#4A90D9" data-color="#4A90D9"></div>
        <div class="preset" style="background:#E74C3C" data-color="#E74C3C"></div>
        <div class="preset" style="background:#2ECC71" data-color="#2ECC71"></div>
        <div class="preset" style="background:#F1C40F" data-color="#F1C40F"></div>
        <div class="preset" style="background:#9B59B6" data-color="#9B59B6"></div>
        <div class="preset" style="background:#E67E22" data-color="#E67E22"></div>
        <div class="preset" style="background:#1ABC9C" data-color="#1ABC9C"></div>
        <div class="preset" style="background:#ECF0F1" data-color="#ECF0F1"></div>
        <div class="preset" style="background:#2C3E50" data-color="#2C3E50"></div>
      </div>
    </div>
    <div id="controls">
      <label>Dekking</label>
      <input type="range" id="opacitySlider" min="10" max="100" value="40">
      <span id="opacityValue">40%</span>
      <button id="modeToggle">🎨 Overlay</button>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const colorOverlay = document.getElementById('colorOverlay');
const colorPicker = document.getElementById('mainColor');
const opacitySlider = document.getElementById('opacitySlider');
const opacityValue = document.getElementById('opacityValue');
const modeToggle = document.getElementById('modeToggle');
const status = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const brushPreview = document.getElementById('brushPreview');
const presets = document.querySelectorAll('.preset');

let stream = null;
let currentColor = '#4A90D9';
let opacity = 0.4;
let mode = 'overlay'; // 'overlay' | 'paint' | 'mix'
let animationId = null;
let isRunning = false;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3), 16) / 255;
  let g = parseInt(hex.slice(3,5), 16) / 255;
  let b = parseInt(hex.slice(5,7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return { h: h * 360, s: s * 100, l: l * 100 };
}

function processFrame() {
  if (!isRunning) return;
  const w = video.videoWidth, h = video.videoHeight;
  if (!w || !h) { animationId = requestAnimationFrame(processFrame); return; }
  canvas.width = w;
  canvas.height = h;

  if (mode === 'overlay') {
    ctx.drawImage(video, 0, 0, w, h);
    const rgb = hexToRgb(currentColor);
    ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;
    ctx.fillRect(0, 0, w, h);
  } else if (mode === 'paint') {
    ctx.drawImage(video, 0, 0, w, h);
    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    const rgb = hexToRgb(currentColor);
    for (let i = 0; i < data.length; i += 4) {
      const avg = (data[i] + data[i+1] + data[i+2]) / 3;
      const t = opacity;
      data[i] = data[i] * (1 - t) + (data[i] * 0.3 + rgb.r * 0.7) * t;
      data[i+1] = data[i+1] * (1 - t) + (data[i+1] * 0.3 + rgb.g * 0.7) * t;
      data[i+2] = data[i+2] * (1 - t) + (data[i+2] * 0.3 + rgb.b * 0.7) * t;
    }
    ctx.putImageData(imageData, 0, 0);
  } else if (mode === 'mix') {
    ctx.drawImage(video, 0, 0, w, h);
    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    const rgb = hexToRgb(currentColor);
    const hsl = hexToHsl(currentColor);
    for (let i = 0; i < data.length; i += 4) {
      const t = opacity;
      const gray = (data[i] + data[i+1] + data[i+2]) / 3;
      const base = gray / 255;
      data[i] = data[i] * (1 - t * 0.5) + (rgb.r * base + data[i] * (1 - base)) * t * 0.5;
      data[i+1] = data[i+1] * (1 - t * 0.5) + (rgb.g * base + data[i+1] * (1 - base)) * t * 0.5;
      data[i+2] = data[i+2] * (1 - t * 0.5) + (rgb.b * base + data[i+2] * (1 - base)) * t * 0.5;
    }
    ctx.putImageData(imageData, 0, 0);
  }
  animationId = requestAnimationFrame(processFrame);
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    startBtn.style.display = 'none';
    status.style.display = 'none';
    isRunning = true;
    processFrame();
  } catch (err) {
    status.textContent = '❌ Camera niet beschikbaar: ' + err.message;
    startBtn.textContent = 'Probeer opnieuw';
  }
}

startBtn.addEventListener('click', startCamera);

colorPicker.addEventListener('input', () => {
  currentColor = colorPicker.value;
  updateOverlay();
  presets.forEach(p => p.classList.toggle('active', p.dataset.color === currentColor));
});

presets.forEach(p => {
  p.addEventListener('click', () => {
    presets.forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentColor = p.dataset.color;
    colorPicker.value = currentColor;
    updateOverlay();
  });
});

opacitySlider.addEventListener('input', () => {
  opacity = parseInt(opacitySlider.value) / 100;
  opacityValue.textContent = Math.round(opacity * 100) + '%';
});

modeToggle.addEventListener('click', () => {
  if (mode === 'overlay') { mode = 'paint'; modeToggle.textContent = '🖌️ Verf'; }
  else if (mode === 'paint') { mode = 'mix'; modeToggle.textContent = '🎨 Mix'; }
  else { mode = 'overlay'; modeToggle.textContent = '🎨 Overlay'; }
});

function updateOverlay() {
  const rgb = hexToRgb(currentColor);
  colorOverlay.style.background = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;
}

document.addEventListener('DOMContentLoaded', () => {
  updateOverlay();
});
</script>
</body>
</html>
